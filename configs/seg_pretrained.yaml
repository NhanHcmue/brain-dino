# ============================================================
# Config: Segmentation — DINO Pretrained Encoder
# Đọc H5 trực tiếp, 1 kênh (flair)
# ============================================================

# ── Data ──
data:
  patch_dir:          "data/brats_h5"
  in_channels:        1
  channel_idx:        3       # 3=flair
  val_split:          0.2
  patches_per_volume: 8
  patch_size: 96              # volume là 134x172x136 → patch 96 vừa đủ
  ram_cache:          false

# ── Pretrained encoder ──
pretrain:
  encoder_path: "outputs/dino/best_encoder.pth"

# ── Output ──
output:
  dir:        "outputs/seg_pretrained"
  checkpoint: "outputs/seg_pretrained/checkpoint.pth"
  best_model: "outputs/seg_pretrained/best_model.pth"

# ── Training ──
train:
  batch_size:  2
  num_epochs:  200
  num_workers: 4
  seed:        42
  grad_accum:  4

# ── Fine-tuning ──
finetune:
  freeze_encoder_epochs: 20
  encoder_lr_scale:      0.01

# ── Optimizer ──
optimizer:
  lr:           2.0e-4
  weight_decay: 1.0e-4

# ── GPU Augmentation ──
augmentation:
  p_flip:      0.5
  p_noise:     0.5
  p_crop:      0.5
  p_cutout:    0.4
  p_intensity: 0.8
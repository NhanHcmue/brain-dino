# ============================================================
# Config: DINO Pretraining — ConvNeXt-Tiny 3D
# Đã cập nhật: đọc H5 trực tiếp, 1 kênh (flair)
# ============================================================
#
# GPU Guide:
#  GPU         VRAM   batch  workers  n_local  grad_accum
#  T4 (Colab)  16GB     4      4        2          4
#  L4          24GB     8      8        4          2
#  RTX3090     24GB     8      8        4          2
#  A100-40G    40GB    16      8        6          1

# ── Data (trỏ thẳng vào thư mục H5, không cần preprocess) ──
data:
  patch_dir:  "data/brats_h5"   # thư mục chứa *.h5 files
  in_channels: 1                # 1 kênh
  channel_idx: 3                # 3=flair (kênh tốt nhất cho BraTS)
  val_split:   0.2
  patches_per_volume: 8         # số random patch mỗi volume mỗi epoch
  patch_size: 96              # volume là 134x172x136 → patch 96 vừa đủ
  ram_cache:  false             # true nếu RAM >= 64GB

# ── Output ──
output:
  dir:          "outputs/dino"
  checkpoint:   "outputs/dino/checkpoint.pth"
  best_encoder: "outputs/dino/best_encoder.pth"

# ── Training ──
train:
  batch_size:    4
  num_epochs:    150
  num_workers:   4
  seed:          42
  grad_accum:    4
  warmup_epochs: 10

# ── Optimizer ──
optimizer:
  base_lr:      1.5e-4
  min_lr:       1.0e-6
  weight_decay: 0.05

# ── DINO hyperparameters ──
dino:
  out_dim:       65536
  momentum:      0.996
  center_momentum: 0.9

  global_scale: [0.85, 1.0]
  local_scale:  [0.40, 0.60]
  n_local_crops: 4

  student_temp:  0.1
  teacher_temp:  0.04
  warmup_teacher_temp:        0.04
  warmup_teacher_temp_epochs: 30